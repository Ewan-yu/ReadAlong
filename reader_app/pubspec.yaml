name: reader_app
description: ReadAlong 跟读宝 — 儿童绘本点读阅读端
publish_to: none
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # 状态与路由
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  # 数据
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  # 资源包导入
  file_picker: ^8.0.0
  archive: ^3.6.0
  crypto: ^3.0.3
  # 音频
  just_audio: ^0.9.40
  record: ^5.1.0
  # 评分（讯飞 ISE WebSocket）
  web_socket_channel: ^3.0.0
  xml: ^6.5.0
  # 密钥存储
  flutter_secure_storage: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
